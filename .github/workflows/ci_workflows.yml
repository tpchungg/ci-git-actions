# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flask pytest
        if [ -f app/requirements.txt ]; then python -m pip install -r app/requirements.txt; fi
    - name: Test with pytest
      run: |
        python -m pytest app/test_app.py -v

 # --- JOB 2: PUSH DOCKER IMAGE ---
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository code first!
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: . # Explicitly tells Docker to build from the root directory
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/py_app:latest
            ${{ vars.DOCKERHUB_USERNAME }}/py_app:${{ github.sha }}