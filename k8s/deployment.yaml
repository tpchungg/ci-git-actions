apiVersion: apps/v1
kind: Deployment
metadata:
  name: py-app-deployment
  namespace: py-app
  labels:
    app: py-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: py-app
  template:
    metadata:
      labels:
        app: py-app
    spec:
      containers:
      - name: py-app-container
        image: tpchungg/py_app:9aceba4f3c8163ad0268da6a110e4b4e434a8108
        imagePullPolicy: Always 
        ports:
        - containerPort: 8080 